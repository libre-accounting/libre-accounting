name: Docker

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.variant.suffix != '' && matrix.variant.suffix || 'main' }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        variant:
          - suffix: ''
            file: ./Dockerfile
          - suffix: fpm
            file: ./docker/fpm.Dockerfile
          - suffix: fpm-alpine
            file: ./docker/fpm-alpine.Dockerfile
          - suffix: fpm-alpine-nginx
            file: ./docker/fpm-alpine-nginx.Dockerfile
          - suffix: fpm-alpine-nginx-composer
            file: ./docker/fpm-alpine-nginx-composer.Dockerfile
          - suffix: fpm-alpine-nginx-composer-supervisor
            file: ./docker/fpm-alpine-nginx-composer-supervisor.Dockerfile
        platform:
          - target: linux/amd64
            runner: ubuntu-latest
          - target: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare build id
        id: prep
        run: |
          slug="${variant_suffix:-main}"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          echo "pair=${slug}-${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          variant_suffix: ${{ matrix.variant.suffix }}
          platform: ${{ matrix.platform.target }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.file }}
          platforms: ${{ matrix.platform.target }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.prep.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.prep.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & Push ${{ matrix.variant.suffix != '' && matrix.variant.suffix || 'main' }}
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        variant:
          - suffix: ''
          - suffix: fpm
          - suffix: fpm-alpine
          - suffix: fpm-alpine-nginx
          - suffix: fpm-alpine-nginx-composer
          - suffix: fpm-alpine-nginx-composer-supervisor

    steps:
      - name: Prepare build id
        id: prep
        run: |
          echo "slug=${variant_suffix:-main}" >> "$GITHUB_OUTPUT"
          if [ -n "$variant_suffix" ]; then
            echo "tag_suffix=-${variant_suffix}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_suffix=" >> "$GITHUB_OUTPUT"
          fi
        env:
          variant_suffix: ${{ matrix.variant.suffix }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ steps.prep.outputs.slug }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            suffix=${{ steps.prep.outputs.tag_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"
