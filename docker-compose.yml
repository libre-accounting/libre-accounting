version: '3.7'

services:
  libre-accounting:
    container_name: libre-accounting
    image: ghcr.io/libre-accounting/libre-accounting:latest
    build:
      context: .
    ports:
      - 8080:80
    restart: unless-stopped
    env_file:
      - docker/env/run.env
    volumes:
      - libre-accounting-uploads:/var/www/html/storage/app/uploads
    environment:
      - LIBRE_ACCOUNTING_SETUP
    depends_on:
      - libre-accounting-db

  libre-accounting-db:
    container_name: libre-accounting-db
    image: mariadb
    volumes:
      - libre-accounting-db:/var/lib/mysql
    restart: unless-stopped
    env_file:
      - docker/env/db.env

  # To run on PostgreSQL instead of MariaDB, comment out the service above and use
  # this one instead, then set DB_CONNECTION=pgsql and DB_PORT=5432 in
  # docker/env/run.env (POSTGRES_* env vars replace the MYSQL_* ones in db.env):
  #
  # libre-accounting-db:
  #   container_name: libre-accounting-db
  #   image: postgres:15
  #   volumes:
  #     - libre-accounting-db:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: akaunting
  #     POSTGRES_USER: admin
  #     POSTGRES_PASSWORD: akaunting_password

volumes:
  libre-accounting-uploads:
  libre-accounting-db:
