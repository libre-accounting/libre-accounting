version: '3.7'

services:

  libre-accounting:
    container_name: libre-accounting
    build:
      dockerfile: fpm-alpine-nginx.Dockerfile
      context: .
    volumes:
      - libre-accounting-data:/var/www/html
      - ./files/php.ini:/usr/local/etc/php/php.ini
      - ./files/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    ports:
      - 8080:80
    env_file:
      - env/run.env
    environment:
      - LIBRE_ACCOUNTING_SETUP
    depends_on:
      - libre-accounting-db

  libre-accounting-db:
    container_name: libre-accounting-db
    image: mariadb
    volumes:
      - libre-accounting-db:/var/lib/mysql
    restart: unless-stopped
    env_file:
      - env/db.env

volumes:
  libre-accounting-data:
  libre-accounting-db:
