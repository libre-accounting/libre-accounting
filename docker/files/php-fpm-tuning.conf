; Pool tuning for Libre Accounting. The stock www.conf caps the pool at
; 5 workers (pm.max_children), which a single heavy page with a few hung
; requests can exhaust — the proxy then returns 503 for everything.
;
; Sizing: pm.max_children ~= RAM available to PHP / peak worker memory.
; With APP_DEBUG=true and Debugbar enabled a worker can peak around 130 MB,
; so 15 workers assume ~2 GB headroom. Adjust to your host.

[www]
pm = dynamic
pm.max_children = 15
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 8

; Recycle workers periodically to cap memory creep.
pm.max_requests = 500

; Kill any request stuck longer than this so one bad request cannot wedge
; a worker forever (the root cause of the pool exhaustion).
request_terminate_timeout = 120s

; Heavy pages with Debugbar enabled need more than the 128M default.
php_admin_value[memory_limit] = 256M

; Surface PHP worker errors in `docker logs`.
catch_workers_output = yes
decorate_workers_output = no
